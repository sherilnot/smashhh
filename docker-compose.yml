services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: fashionshop
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d fashionshop"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: fashionshop
      DB_USER: admin
      DB_PASSWORD: secret
      PORT: 3000
      NODE_ENV: development
      SESSION_SECRET: docker-dev-secret-change-in-prod

volumes:
  pgdata:
